{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h1>Scan History</h1>

    <table>

        <tr>
            <th>URL</th>
            <th>Prediction</th>
            <th>Risk Score</th>
        </tr>

        {% for scan in scans %}

        <tr>

            <td>{{ scan.url }}</td>

            <td>{{ scan.prediction }}</td>

            <td>{{ scan.risk_score }}%</td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
