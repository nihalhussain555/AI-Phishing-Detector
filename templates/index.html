{% extends 'base.html' %}

{% block content %}

<div class="container">
    <div class="glass-card">
        <h1>Website Security <span class="gradient-text">Scanner</span></h1>
        
        <p class="subtitle">
            Enter a URL to analyze its connectivity, trust factors, and AI-predicted risk level.
        </p>

        <form action="/scan" method="POST">
            <div class="input-group">
                <input
                    type="url"
                    name="url"
                    placeholder="https://example.com"
                    required
                >
                <button type="submit">Scan Now</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
