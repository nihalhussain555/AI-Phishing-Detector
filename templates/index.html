{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h1>AI Powered Phishing Website Detection</h1>

    <p>
        Enter a website URL and detect whether it is safe or phishing.
    </p>

    <form action="/scan" method="POST">

        <input
            type="text"
            name="url"
            placeholder="https://example.com"
            required
        >

        <button type="submit">
            Scan Website
        </button>

    </form>

</div>

{% endblock %}
