{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h1>Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>{{ total_scans }}</h2>
            <p>Total Scans</p>
        </div>

        <div class="card">
            <h2>{{ safe_count }}</h2>
            <p>Safe Websites</p>
        </div>

        <div class="card">
            <h2>{{ phishing_count }}</h2>
            <p>Phishing Websites</p>
        </div>

    </div>

</div>

{% endblock %}
